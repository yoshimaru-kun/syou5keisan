<html lang="ja">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;800&display=swap" rel="stylesheet">

        :root {
            --primary: #FF9800;
            --secondary: #4CAF50;
            --accent: #03A9F4;
            --bg: #FFF3E0;
            --text: #333;
            --light: #fff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'M PLUS Rounded 1c', sans-serif;
            color: var(--text);
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(#FFCC80 15%, transparent 16%), radial-gradient(#FFCC80 15%, transparent 16%);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        #app {
            background-color: var(--light);
            width: 100%;
            max-width: 600px;
            min-height: 80vh;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--primary);
            color: var(--light);
            text-align: center;
            padding: 20px 10px;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .screen {
            display: none;
            padding: 30px;
            flex: 1;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            animation: fadeIn 0.4s ease-in-out;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: var(--primary);
            font-size: 2.8rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px #FFE0B2;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .btn {
            background-color: var(--accent);
            color: var(--light);
            border: none;
            padding: 15px 30px;
            font-size: 1.3rem;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #0288D1;
            transition: all 0.1s;
            margin: 10px 0;
            width: 100%;
            max-width: 300px;
        }

        .btn:active {
            box-shadow: 0 2px 0 #0288D1;
            transform: translateY(4px);
        }

        .btn.start-btn {
            background-color: var(--secondary);
            box-shadow: 0 6px 0 #2E7D32;
            font-size: 1.6rem;
            padding: 20px 40px;
        }

        .btn.start-btn:active {
            box-shadow: 0 2px 0 #2E7D32;
        }

        .btn:disabled, .btn.disabled {
            background-color: #ccc;
            box-shadow: 0 6px 0 #999;
            cursor: not-allowed;
            color: #666;
        }

        /* ユニット選択画面 */
        .units-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
        }

        .unit-card {
            background-color: var(--light);
            border: 3px solid var(--primary);
            border-radius: 15px;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .unit-card:hover:not(.locked) {
            background-color: #FFF3E0;
            transform: scale(1.02);
        }

        .unit-card.locked {
            border-color: #ccc;
            background-color: #f5f5f5;
            color: #999;
            cursor: not-allowed;
        }

        /* クイズ画面 */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 20px;
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--primary);
        }

        .question-box {
            background-color: #E1F5FE;
            border-radius: 15px;
            padding: 25px 15px;
            width: 100%;
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 25px;
            box-shadow: 0 4px 0 #B3E5FC;
        }

        .choices-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            margin-bottom: 20px;
        }

        .choice-btn {
            background-color: #fff;
            color: var(--text);
            border: 3px solid var(--accent);
            border-radius: 15px;
            padding: 15px;
            font-size: 1.4rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 5px 0 var(--accent);
        }

        .choice-btn:active:not(:disabled) {
            box-shadow: 0 1px 0 var(--accent);
            transform: translateY(4px);
        }

        .choice-btn.correct {
            background-color: var(--secondary);
            color: #fff;
            border-color: var(--secondary);
            box-shadow: 0 5px 0 #2E7D32;
        }

        .choice-btn.wrong {
            background-color: #f44336;
            color: #fff;
            border-color: #f44336;
            box-shadow: 0 5px 0 #c62828;
        }

        .input-box {
            width: 100%;
            max-width: 250px;
            font-size: 2rem;
            padding: 10px;
            text-align: center;
            border: 3px solid var(--accent);
            border-radius: 15px;
            margin-bottom: 20px;
            color: var(--text);
        }

        .input-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .feedback-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .feedback-overlay.show {
            opacity: 1;
        }

        .feedback-icon {
            font-size: 150px;
            text-shadow: 0 10px 20px rgba(0,0,0,0.3);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .explanation-box {
            display: none;
            background-color: #FFF9C4;
            border: 2px dashed #FBC02D;
            border-radius: 15px;
            padding: 15px;
            width: 100%;
            margin-top: 15px;
            text-align: left;
            font-size: 1.1rem;
            animation: fadeIn 0.3s;
        }

        .explanation-box.show {
            display: block;
        }

        .explanation-title {
            color: #F57F17;
            font-weight: 800;
            margin-bottom: 5px;
        }

        /* 結果画面 */
        .score-circle {
            width: 150px;
            height: 150px;
            background-color: var(--primary);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px auto;
            color: white;
            font-size: 3rem;
            font-weight: 800;
            box-shadow: 0 10px 0 #E65100;
            animation: bounceIn 0.8s;
        }

        @keyframes bounceIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .result-msg {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--secondary);
            margin-bottom: 30px;
        }

        .celebrate {
            font-size: 50px;
            margin-bottom: 10px;
        }

        @media (max-width: 500px) {
            h1 { font-size: 2.2rem; }
            .btn.start-btn { font-size: 1.3rem; padding: 15px 30px; }
            .question-box { font-size: 1.4rem; }
            .choices-grid { gap: 10px; }
            .choice-btn { font-size: 1.2rem; padding: 10px; }
            .screen { padding: 20px; }
        }
    </style>
</head>

            </div>

            <div class="explanation-box" id="explanation-box">

                <div id="explanation-text"></div>
            </div>

            <button class="btn" id="next-btn" style="display: none; margin-top: 20px;" onclick="nextQuestion()">つぎへ ➡</button>

            <!-- まるばつアニメーション用 -->
            <div class="feedback-overlay" id="feedback-overlay">
                <div class="feedback-icon" id="feedback-icon"></div>
            </div>
        </div>

        <!-- 結果画面 -->
        <div id="result-screen" class="screen">
            <h2>ぼうけんクリア！🎉</h2>
            
            <div class="score-circle">

            <div class="result-msg" id="result-message">
                よくがんばったね！

            <button class="btn start-btn" onclick="showScreen('unit-screen')">マップへもどる</button>
            <button class="btn" style="background-color: #9E9E9E; box-shadow: 0 6px 0 #616161;" onclick="showScreen('title-screen')">はじめから</button>
        </div>

        // 状態変数
        let currentUnitId = 1;
        let currentQuizType = "choice";
        let currentQuestionIndex = 0;
        let score = 0;
        let canAnswer = true;
        let currentQuestions = [];

        // 初期化処理
        function initApp() {
            renderUnits();
        }

        // 画面の切り替え
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

                // 単元リストの描画
        function renderUnits() {
            const container = document.getElementById('units-container');
            container.innerHTML = '';
            container.style.display = 'flex';
            container.style.flexDirection = 'column';
            container.style.gap = '20px';

            genres.forEach(genre => {
                const genreDiv = document.createElement('div');
                genreDiv.style.backgroundColor = '#fff';
                genreDiv.style.border = '3px solid var(--primary)';
                genreDiv.style.borderRadius = '15px';
                genreDiv.style.padding = '15px';
                genreDiv.style.textAlign = 'left';

                const genreTitle = document.createElement('h3');
                genreTitle.innerText = `${genre.icon} ${genre.title}`;
                genreTitle.style.color = 'var(--primary)';
                genreTitle.style.fontSize = '1.4rem';
                genreTitle.style.marginBottom = '15px';
                genreTitle.style.borderBottom = '2px dashed #FFCC80';
                genreTitle.style.paddingBottom = '5px';
                genreDiv.appendChild(genreTitle);

                const modesDiv = document.createElement('div');
                modesDiv.style.display = 'flex';
                modesDiv.style.gap = '10px';
                modesDiv.style.flexWrap = 'wrap';

                const modes = unitModes.filter(m => m.id === genre.id);
                
                modes.forEach(mode => {
                    const btn = document.createElement('button');
                    btn.className = `btn ${mode.locked ? 'disabled' : ''}`;
                    btn.style.margin = '0';
                    btn.style.flex = '1';
                    btn.style.minWidth = '130px';
                    btn.style.padding = '12px 10px';
                    btn.style.fontSize = '1.1rem';
                    
                    let lockIcon = mode.locked ? '🔒' : (mode.type === 'input' ? '🔥' : '✨');
                    if (mode.type === 'input' && !mode.locked) {
                        btn.style.backgroundColor = '#E53935'; 
                        btn.style.boxShadow = '0 5px 0 #B71C1C';
                    }
                    
                    btn.innerText = `${mode.name} ${lockIcon}`;

                    if (!mode.locked) {
                        btn.onclick = () => startQuiz(genre.id, `${genre.title}（${mode.name}）`, mode.type);
                    }
                    modesDiv.appendChild(btn);
                });

                genreDiv.appendChild(modesDiv);
                container.appendChild(genreDiv);
            });
        }

        // クイズ開始
        function startQuiz(unitId, unitName, quizType) {
            currentUnitId = unitId;
            currentQuizType = quizType;
            let allQuestions = quizData[unitId] || [];
            
            if (allQuestions.length === 0) {
                alert("まだ問題がありません！");
                return;
            }

            // 追加：100問のプールから毎回ランダムに5問を抽出する
            const shuffled = [...allQuestions].sort(() => 0.5 - Math.random());
            currentQuestions = shuffled.slice(0, 5);

            currentQuestionIndex = 0;
            score = 0;
            document.getElementById('current-unit-name').innerText = unitName;
            
            showQuestion();
            showScreen('quiz-screen');
        }

        // 問題の表示
        function showQuestion() {
            canAnswer = true;
            const q = currentQuestions[currentQuestionIndex];
            
            document.getElementById('question-progress').innerText = `${currentQuestionIndex + 1} / ${currentQuestions.length} 問`;
            document.getElementById('question-text').innerText = q.question;
            
            const diagramEl = document.getElementById('diagram-container');
            if (q.diagram) {
                diagramEl.innerHTML = q.diagram;
                diagramEl.style.display = 'block';
            } else {
                diagramEl.style.display = 'none';
            }
            
            const choicesContainer = document.getElementById('choices-container');
            choicesContainer.innerHTML = '';

            // 解説や次へボタンを隠す
            document.getElementById('explanation-box').classList.remove('show');
            document.getElementById('next-btn').style.display = 'none';

            if (currentQuizType === 'choice') {
                choicesContainer.style.display = 'grid';
                q.choices.forEach((choiceText, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'choice-btn';
                    btn.innerText = choiceText;
                    btn.onclick = () => checkAnswerChoice(index, btn);
                    choicesContainer.appendChild(btn);
                });
            } else {
                choicesContainer.style.display = 'flex';
                choicesContainer.innerHTML = `
                    <div class="input-container">
                        <input type="text" id="answer-input" class="input-box" placeholder="${currentUnitId === 4 ? `例: 1/2` : `こたえは？`}">
                        <button class="btn" style="width:100%; max-width:250px;" id="submit-answer-btn" onclick="checkAnswerInput()">答える</button>
                    </div>
                `;
                setTimeout(() => {
                    const el = document.getElementById('answer-input');
                    if(el) {
                        el.focus();
                        // Enterキーでの回答送信機能を追加
                        el.addEventListener('keypress', function(e) {
                            if (e.key === 'Enter') checkAnswerInput();
                        });
                    }
                }, 100);
            }
        }

        // 答え合わせ (4択)
        function checkAnswerChoice(selectedIndex, btnElement) {
            handleAnswerResult(selectedIndex === currentQuestions[currentQuestionIndex].correctIndex, btnElement);
        }

        // 答え合わせ (入力)
        function checkAnswerInput() {
            const inputEl = document.getElementById('answer-input');
            const submitBtn = document.getElementById('submit-answer-btn');
            if (!inputEl.value) return; // 空なら何もしない
            
            const q = currentQuestions[currentQuestionIndex];
            const correctStr = String(q.choices[q.correctIndex]);
            
            // 値の比較
            let userVal = inputEl.value.trim().replace(/[０-９／]/g, function(s) {
                return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
            });
            let isCorrect = false;
            if (isNaN(Number(correctStr)) || correctStr.includes('/')) {
                isCorrect = (userVal === correctStr.trim());
            } else {
                isCorrect = (Number(userVal) === Number(correctStr));
            }
            
            handleAnswerResult(isCorrect, null);
            inputEl.disabled = true;
            submitBtn.disabled = true;
            
            if (!isCorrect) {
                inputEl.style.backgroundColor = '#fce4e4';
                inputEl.type = 'text';
                inputEl.value = `❌ 君:${inputEl.value} / ⭕️ 正解:${correctStr}`;
                inputEl.style.fontSize = '1.0rem';
            } else {
                inputEl.style.backgroundColor = '#e8f5e9';
            }
        }

        // 答え合わせ共通処理
        function handleAnswerResult(isCorrect, btnElement) {
            if (!canAnswer) return;
            canAnswer = false;

            const q = currentQuestions[currentQuestionIndex];
            showFeedback(isCorrect);
            
            if (isCorrect) {
                if (btnElement) btnElement.classList.add('correct');
                score += 20;
            } else {
                if (btnElement) btnElement.classList.add('wrong');
                if (currentQuizType === 'choice') {
                    const allBtns = document.querySelectorAll('.choice-btn');
                    if(allBtns[q.correctIndex]) allBtns[q.correctIndex].classList.add('correct');
                }
            }

            if (currentQuizType === 'choice') {
                document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
            }

            document.getElementById('explanation-text').innerText = q.explanation;
            document.getElementById('explanation-box').classList.add('show');
            
            const nextBtn = document.getElementById('next-btn');
            if (currentQuestionIndex < currentQuestions.length - 1) {
                nextBtn.innerText = "つぎの問題へ ➡";
            } else {
                nextBtn.innerText = "結果を見る 🌟";
            }
            nextBtn.style.display = 'block';
        }

        // ◯✖アニメーションの表示
        function showFeedback(isCorrect) {
            const overlay = document.getElementById('feedback-overlay');
            const icon = document.getElementById('feedback-icon');
            
            if (isCorrect) {
                icon.innerText = "⭕️";
                icon.style.color = "#4CAF50";
            } else {
                icon.innerText = "❌";
                icon.style.color = "#F44336";
            }

            overlay.classList.add('show');
            
            // 少ししたら消す
            setTimeout(() => {
                overlay.classList.remove('show');
            }, 1000);
        }

        // 次の問題または結果画面へ
        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < currentQuestions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        // 結果画面の表示
        function showResult() {
            document.getElementById('score-text').innerText = score;
            
            const msgObj = document.getElementById('result-message');
            if (score === 100) {
                msgObj.innerText = "パーフェクト！てんさいだ！🏆";
                msgObj.style.color = "#FF9800";
            } else if (score >= 80) {
                msgObj.innerText = "すごい！あとすこし！✨";
                msgObj.style.color = "#4CAF50";
            } else if (score >= 60) {
                msgObj.innerText = "よくがんばったね！👍";
                msgObj.style.color = "#03A9F4";
            } else {
                msgObj.innerText = "またチャレンジしよう！💪";
                msgObj.style.color = "#E91E63";
            }

            showScreen('result-screen');
        }

        // アプリ起動
        window.onload = initApp;
    </script>
</body>
</html>
